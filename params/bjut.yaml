# =============================================================================
# ROS2 Bag 转 nuScenes 数据集转换参数配置文件
# =============================================================================
# 配置文件分为两大部分：
#   1. BAG_INFO:     Bag 文件基本信息和元数据
#   2. SENSOR_INFO:  各传感器的 topic、frame 和校准参数
# =============================================================================

BAG_INFO:
  TEAM: BJUT                       # 数据采集团队名称
  DESCRIPTION: 北京工业大学校内采集数据  # 数据集描述
  ODOM_TOPIC: "/chcnav/devpvt"    # Odometry 话题路径 (Hcinspvatzcb 或 nav_msgs/Odometry)
  TRACK: SCHOOL                    # 行驶场景标识
  URDF: "urdf/bjut.urdf"          # 传感器外参描述文件 (相对路径)

  # 原点经纬度 (Hcinspvatzcb 转换为笛卡尔坐标时使用)
  # 用于 GPS 经纬度 → 局部 XYZ (米) 的投影计算
  LAT_ORIGIN: 39.0                 # 原点纬度 (度)
  LON_ORIGIN: 116.0                # 原点经度 (度)

  # 导出 JSON 与 nuScenes 对齐：sample / sample_data / ego_pose 的 timestamp 为微秒整型；
  # sample_data 的 filename 为相对数据集根的路径（如 samples/CAMERA_01/...）；文件名内时间戳亦为微秒。

  # --- Sample 划分策略（二选一）---
  # batch_cameras：未做时间同步的 bag，按顺序凑满全部相机再成一个 sample（默认，推荐异步数据）
  # time_window：老板版逻辑，按 SAMPLE_INTERVAL 划分时间窗 + 每窗每通道至多一条进 samples（已同步数据推荐）
  SAMPLE_STRATEGY: batch_cameras

  # SAMPLE_INTERVAL（秒）仅当上面为 time_window 时生效：表示「约每隔这么久」用老板版逻辑切一个新 sample。
  # 若为 batch_cameras：新 sample 只看是否已凑齐全部相机各一帧，与 SAMPLE_INTERVAL 无关（改这个数不影响切分）。
  SAMPLE_INTERVAL: 0.5

# =============================================================================
# SENSOR_INFO: 传感器配置
# =============================================================================
# 命名规范: [传感器类型]_[安装位置]，如 CAMERA_01, LIDAR_FRONT
# 支持类型: CAMERA, LIDAR, RADAR, IMU
# =============================================================================
SENSOR_INFO:

  # ---------------------------------------------------------------------------
  # 激光雷达配置
  # ---------------------------------------------------------------------------
  LIDAR_FRONT:
    TOPIC: "/rslidar_points"       # 点云数据 topic
    FRAME: "rslidar"               # 关联的 URDF frame ID

  # ---------------------------------------------------------------------------
  # 相机配置
  # ---------------------------------------------------------------------------
  # CALIB 字段支持三种格式：
  #   1. 内联参数:  直接在 YAML 中指定 fx, fy, cx, cy 和畸变参数
  #   2. ROS topic: 指定 camera_info topic 路径，从 bag 中读取
  #   3. "null":     不写入内参（仅用于无内参需求的情况）
  # ---------------------------------------------------------------------------

  CAMERA_01:
    TOPIC: "/cam1"                 # 相机图像 topic
    FRAME: "cam1"                  # URDF frame ID
    CALIB:                         # 内联内参配置
      fx: 1017.7968669452                   # 焦距 x (像素)
      fy: 1017.7180554471                   # 焦距 y (像素)
      cx: 960.2652421927                    # 主点 x 偏移 (像素)
      cy: 539.7736451654                    # 主点 y 偏移 (像素)
      k1: 1.0993703625                      # 径向畸变系数 k1
      k2: 0.2607466029                      # 径向畸变系数 k2
      p1: 0.0000885744                      # 切向畸变系数 p1
      p2: -0.0000150492                      # 切向畸变系数 p2
      k3: 0.0077909308                      # 径向畸变系数 k3

  CAMERA_02:
    TOPIC: "/cam2"
    FRAME: "cam2"
    CALIB:
      fx: 3773.9047953574
      fy: 3773.6818485413
      cx: 1923.1416793071
      cy: 1103.2582249772
      k1: -0.1488048078
      k2: 17.2102326819
      p1: -0.0015892288
      p2: -0.0012853594
      k3: 3.5380325446

